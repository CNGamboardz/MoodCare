<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodCare - Historial</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <aside class="sidebar">
    <h2>
      <img src="image/logo.png" alt="logo">
      MoodCare
    </h2>

    <nav id="menu">
        <div class="menu-item" onclick="window.location.href='inicio.html'">
        <img src="image/casa.png">
        <span>Inicio</span>
      </div>

      <div class="menu-item" onclick="window.location.href='index.html'">
        <span>Chat</span>
      </div>

      <div class="menu-item" onclick="window.location.href='registro.html'">
        <img src="image/registroemocional.png">
        <span>Registro emocional</span>
      </div>

      <div class="menu-item active">
        <img src="image/historial.png">
        <span>Historial</span>
      </div>
    </nav>

    <!-- 👤 USUARIO -->
    <div class="user-box">
      <img id="fotoPerfil" src="image/user.jpg">
      <div>
        <b id="nombreUser">Tu Nombre</b><br>
        <small id="correoUser">tu@email.com</small>
      </div>
    </div>

    <!-- 🔐 LOGOUT -->
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>

  </aside>


    <main class="historial-content">

      <h1>Historial de mensajes</h1>
      <p class="historial-sub">Revisa tus conversaciones anteriores con ModCare</p>

      <!-- 🔥 RESUMEN -->
      <div class="historial-top">

        <div class="historial-total">
          <span>Total conversaciones</span>
          <h2 id="totalConversaciones">0</h2>
          <small>Conversaciones</small>
        </div>

        <div class="historial-emociones">
          <span>Resumen emocional</span>
          <div id="resumenEmociones" class="emociones-list"></div>
        </div>

      </div>

      <!-- 🔥 TABLA -->
      <div class="historial-card">

        <table class="historial-tabla">
          <thead>
            <tr>
              <th>Conversación</th>
              <th>Último mensaje</th>
              <th>Emoción detectada</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaHistorial"></tbody>

        </table>

         <div id="paginacionHistorial" class="paginacion"></div>

        <div class="historial-footer">
          <span id="contadorHistorial">Mostrando 0 conversaciones</span>
        </div>

      </div>
      
    </main>

    <script src="app.obf.js"></script>

</body>
</html>
