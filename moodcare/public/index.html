<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodCare</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <aside class="sidebar">

    <header>
      <h2>
        <img src="image/logo.png" alt="logo">
        MoodCare
      </h2>
    </header>

    <nav id="menu">
      <ul>

        <li class="menu-item" onclick="window.location.href='inicio.html'">
          <img src="image/casa.png" alt="">
          <span>Inicio</span>
        </li>

        <li class="menu-item active">
          <img src="image/chat.png" alt="">
          <span>Chat</span>
        </li>

        <li class="menu-item" onclick="window.location.href='registro.html'">
          <img src="image/registroemocional.png" alt="">
          <span>Registro emocional</span>
        </li>

        <li class="menu-item" onclick="window.location.href='historial.html'">
          <img src="image/historial.png" alt="">
          <span>Historial</span>
        </li>

      </ul>
    </nav>

    <section class="user-box">
      <img id="fotoPerfil" src="image/user.jpg" alt="Foto de perfil">
      <div>
        <strong id="nombreUser">Tu Nombre</strong><br>
        <small id="correoUser">tu@email.com</small>
      </div>
    </section>

    <footer>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </footer>

  </aside>

  <main class="main" id="mainChat">

    <header class="top-bar">
      <button class="btn-new-chat" onclick="nuevoChat()">＋ Nuevo chat</button>
    </header>

    <section class="chat-center" id="chatUI">

      <header>
        <h1><strong>MoodCare</strong> Assistant</h1>
        <p>¿Cómo te sientes el día de hoy?</p>
      </header>

      <section class="input-wrapper">
        <input 
          id="mensaje" 
          placeholder="Escribe cómo te sientes..." 
          onkeypress="if(event.key === 'Enter'){ enviarMensaje(); }"
        />

        <div class="input-actions">
          <button id="btnMic" onclick="toggleMic()">
            <img src="image/dictado de voz.png" alt="Micrófono">
          </button>

          <button id="btnVoz" onclick="toggleVoz()">🔊</button>

          <button onclick="enviarMensaje()">➤</button>
        </div>
      </section>

      <section class="quick-options">
        <button class="option" onclick="fill('Estoy triste')">😢 Estoy triste</button>
        <button class="option" onclick="fill('Me siento feliz')">😊 Me siento feliz</button>
        <button class="option" onclick="fill('Tengo ansiedad')">😟 Tengo ansiedad</button>
      </section>

      <section class="chat-container" id="chatContainer">
        <article id="chat"></article>
      </section>

    </section>
    
  </main>

  <script src="app.js"></script>

</body>
</html>
