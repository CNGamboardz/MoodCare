<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodCare - Chat</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <aside class="sidebar">
    <header>
      <h2>
        <img src="image/logo.png" alt="logo">
        MoodCare
      </h2>
    </header>

    <nav id="menu">
      <ul>
        <li class="menu-item" onclick="window.location.href='inicio.html'">
          <img src="image/casa.png" alt="">
          <span>Inicio</span>
        </li>
        <li class="menu-item active">
          <img src="image/chat.png" alt="">
          <span>Chat</span>
        </li>
        <li class="menu-item" onclick="window.location.href='registro.html'">
          <img src="image/registroemocional.png" alt="">
          <span>Registro emocional</span>
        </li>
        <li class="menu-item" onclick="window.location.href='historial.html'">
          <img src="image/historial.png" alt="">
          <span>Historial</span>
        </li>
      </ul>
    </nav>

    <section class="user-box">
      <img id="fotoPerfil" src="image/user.jpg" alt="Foto de perfil">
      <div>
        <strong id="nombreUser">Tu Nombre</strong><br>
        <small id="correoUser">tu@email.com</small>
      </div>
    </section>

    <footer>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </footer>
  </aside>

  <main class="main" id="mainChat">
    <section class="chat-center" id="chatUI">

      <!-- Bienvenida (se oculta al chatear) -->
      <header>
        <h1><strong>MoodCare</strong> Assistant</h1>
        <p>¿Cómo te sientes el día de hoy?</p>
      </header>

      <!-- Header visible durante el chat -->
      <div class="chat-header" style="display:none;">
        <img src="image/logo.png" alt="logo" style="width:28px;height:28px;border-radius:50%;">
        <span>MoodCare</span>

        <!-- Botón descargar PDF -->
        <button id="btnDescargarPDF" onclick="descargarChatPDF()" title="Descargar conversación como PDF" class="btn-pdf-download">
          <span class="pdf-icon">📥</span>
          <span class="pdf-label">Reporte PDF</span>
        </button>
      </div>

      <!-- Contenedor de mensajes -->
      <section class="chat-container" id="chatContainer">
        <article id="chat"></article>
      </section>

      <!-- Input pill fijo -->
      <section class="input-wrapper">
        <div class="input-pill">
          <input
            id="mensaje"
            placeholder="¿Cómo te sientes el día de hoy?"
            onkeypress="if(event.key === 'Enter'){ enviarMensaje(); }"
          />
          <div class="input-actions">
            <button id="btnClip" title="Adjuntar archivo">
              <img src="image/adjunto-archivo.png" alt="Adjuntar">
            </button>
            <button id="btnMic" onclick="toggleMic()" title="Dictado de voz">
              <img src="image/dictado de voz.png" alt="Micrófono">
            </button>
            <button id="btnVoz" onclick="toggleVoz()" title="Voz">🔊</button>
            <button id="btnEnviar" onclick="enviarMensaje()" title="Enviar">
              <img src="image/flecha.png" alt="Enviar">
            </button>
          </div>
        </div>
      </section>

      <!-- Opciones rapidas -->
      <section class="quick-options">
        <button class="option" onclick="fill('Estoy triste')">😢 Estoy triste</button>
        <button class="option" onclick="fill('Me siento feliz')">😊 Me siento feliz</button>
        <button class="option" onclick="fill('Tengo ansiedad')">😟 Tengo ansiedad</button>
      </section>

    </section>
  </main>

  <!-- Librerías para PDF (jsPDF y html2pdf) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
