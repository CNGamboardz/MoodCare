<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro emocional</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="registro-body">

<!-- SIDEBAR -->
<aside class="registro-sidebar">

  <h2 class="registro-logo">
    <img src="./image/logo.png">
    MoodCare
  </h2>

  <nav>
    <div class="registro-menu" onclick="location.href='inicio.html'">
      <img src="./image/casa.png"> Inicio
    </div>

    <div class="registro-menu" onclick="location.href='index.html'">
      <img src="./image/chat.png"> Chat
    </div>

    <div class="registro-menu active">
      <img src="./image/registroemocional.png"> Registro emocional
    </div>

    <div class="registro-menu" onclick="location.href='historial.html'">
      <img src="./image/historial.png"> Historial
    </div>
  </nav>

</aside>

<!-- MAIN -->
<main class="registro-main">

<h1 class="registro-title">Registro emocional</h1>

<!-- CARDS -->
<div class="registro-top">

  <!-- ESTADO -->
  <div class="registro-card estado">
    <p>Estado emocional de hoy</p>

    <div class="estado-contenido">
      <span id="emojiEstado"></span>
      <h2 id="estadoHoy"></h2>
    </div>
  </div>

  <!-- PUNTUACION -->
  <div class="registro-card icono">
    <div class="icono-card">
      <img src="./image/promedio.png">
    </div>
    <div>
      <p>Puntuación emocional</p>
      <h2 id="puntuacionHoy"></h2>
    </div>
  </div>

  <!-- REGISTROS -->
  <div class="registro-card icono">
    <div class="icono-card">
      <img src="./image/calen.png">
    </div>
    <div>
      <p>Registros por semana</p>
      <h2 id="totalRegistros"></h2>
    </div>
  </div>

  <!-- ULTIMO -->
  <div class="registro-card icono">
    <div class="icono-card">
      <img src="./image/calen.png">
    </div>
    <div>
      <p>Último registro</p>
      <h2 id="ultimoRegistro"></h2>
    </div>
  </div>

</div>

<!-- GRID -->
<div class="registro-grid">

  <!-- IZQUIERDA -->
  <div class="registro-left">

    <div class="registro-box">
      <h3>Últimos registros</h3>

      <div class="tabla-slider">
       <table id="tablaRegistros"></table>
      </div>

    </div>

    <div class="registro-box">
      <h3>Historial emocional semanal</h3>
      <canvas id="grafica"></canvas>
    </div>

  </div>

  <!-- DERECHA -->
  <div class="registro-side">

    <div class="registro-calendar-box">
      <h3>Registro emocional mensual</h3>
  
      <div id="calendar"></div>
      <div class="cal-legend">
        <div><span class="dot feliz"></span> Feliz</div>
        <div><span class="dot neutral"></span> Neutral</div>
        <div><span class="dot ansiedad"></span> Ansiedad</div>
        <div><span class="dot triste"></span> Triste</div>
        <div><span class="dot enojado"></span> Enojado</div>
      </div>
      <div id="detalleDia" class="detalle-dia"></div>
    </div>
    

    <div class="registro-reco">
      <h4>Recomendaciones</h4>
      <div id="recomendaciones"></div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</main>
</body>
</html>
