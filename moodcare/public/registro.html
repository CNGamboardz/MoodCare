<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodCare - Registro</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <aside class="sidebar">
    <h2>
      <img src="image/logo.png" alt="logo">
      MoodCare
    </h2>

    <nav>
      <div class="menu-item" onclick="window.location.href='inicio.html'">
        <img src="image/casa.png" alt="">
        <span>Inicio</span>
      </div>

      <div class="menu-item" onclick="window.location.href='index.html'">
        <img src="image/chat.png" alt="">
        <span>Chat</span>
      </div>

      <div class="menu-item active">
        <img src="image/registroemocional.png" alt="">
        <span>Registro emocional</span>
      </div>

      <div class="menu-item" onclick="window.location.href='historial.html'">
        <img src="image/historial.png" alt="">
        <span>Historial</span>
      </div>
    </nav>

    <div class="user-box">
      <img src="image/user.jpg" alt="user">
      <div>
        <b>Tu Nombre</b><br>
        <small>tu@email.com</small>
      </div>
    </div>
  </aside>

  <main class="main">
    <h1>Registro emocional</h1>
    <p>Registra cómo te sientes hoy:</p>

    <div class="card">
      <label>¿Cómo te sientes?</label>
      <input type="text" placeholder="Ej: Feliz, triste, ansioso...">

      <label>Puntuación (1-10)</label>
      <input type="number" min="1" max="10">

      <button class="btn-primary">Guardar</button>
    </div>
  </main>

</body>
</html>
