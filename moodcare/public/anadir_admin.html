<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Añadir Administrador</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body class="mc-admin-add-page">

  <!-- LOGO -->
  <div class="login-logo">
    <img src="image/logo.png" alt="Logo">
    <b>MoodCare</b>
  </div>

  <div class="mc-admin-add-wrapper">

    <div class="mc-admin-add-card">

      <!-- HEADER -->
      <div class="mc-admin-add-header">

        <img
          src="image/admin.png"
          class="mc-admin-add-icon"
          alt="Admin"
        >

        <div>
          <h2>Registrar Administrador</h2>
          <p>Agrega un nuevo administrador al sistema</p>
        </div>

      </div>

      <!-- FORM -->
      <form
        id="formAdmin"
        enctype="multipart/form-data"
      >

        <div class="mc-admin-add-grid">

          <!-- NOMBRE -->
          <div class="mc-admin-add-group">

            <label>Nombre Completo:</label>

            <input
              type="text"
              name="nombre"
              required
            >

          </div>

          <!-- CORREO -->
          <div class="mc-admin-add-group">

            <label>Correo electrónico:</label>

            <input
              type="email"
              name="correo"
              required
            >

          </div>

          <!-- PASSWORD -->
          <div class="mc-admin-add-group">

            <label>Contraseña:</label>

            <div class="mc-input-password">

              <input
                type="password"
                id="passwordInput"
                name="password"
                required
              >

              <span
                class="mc-toggle-eye"
                onclick="togglePassword()"
              >
                👁️
              </span>

            </div>

          </div>

          <!-- FECHA -->
          <div class="mc-admin-add-group">

            <label>Fecha de nacimiento:</label>

            <input
              type="date"
              name="fecha_nacimiento"
            >

          </div>

          <!-- TELÉFONO -->
          <div class="mc-admin-add-group">

            <label>Teléfono:</label>

            <input
              type="text"
              name="telefono"
              maxlength="10"
              pattern="\d{10}"
              inputmode="numeric"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              placeholder="Ej. 9611234567"
            >

          </div>

          <!-- FOTO -->
          <div class="mc-admin-add-group">

            <label>Foto de perfil:</label>

            <input
              type="file"
              name="foto"
              accept="image/*"
            >

          </div>

        </div>

        <!-- BOTONES -->
        <div class="mc-admin-add-actions">

          <button
            type="button"
            class="mc-btn-cancel"
            onclick="window.location.href='adminis.html'"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="mc-btn-save"
          >
            Guardar administrador
          </button>

        </div>

      </form>

    </div>

  </div>

  <script src="app.js"></script>

  <script>

    // MOSTRAR / OCULTAR PASSWORD
    function togglePassword() {

      const input = document.getElementById("passwordInput");

      if (input.type === "password") {

        input.type = "text";

      } else {

        input.type = "password";

      }

    }

    // ENVIAR FORMULARIO
    document.getElementById("formAdmin")
    .addEventListener("submit", async (e) => {

      e.preventDefault();

      const formData = new FormData(e.target);

      try {

        const response = await fetch("/register-admin", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        console.log(data);

        if (data.ok) {

          alert("Administrador registrado correctamente");

          window.location.href = "adminis.html";

        } else {

          alert("Error al registrar administrador");

          console.log(data);

        }

      } catch (error) {

        console.error(error);

        alert("Error del servidor");

      }

    });

  </script>

</body>

</html>
