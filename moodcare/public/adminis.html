<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodCare</title>

  <link rel="stylesheet" href="./styles.css">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- HEADER -->
    <header>
      <h2>
        <img src="image/logo.png" alt="logo">
        MoodCare
      </h2>
    </header>

    <!-- NAV -->
    <nav id="menu">

      <div class="menu-item" onclick="window.location.href='./inicio_admin.html'">
        <img src="image/casa.png" alt="">
        <span>Inicio</span>
      </div>

      <div class="menu-item" onclick="window.location.href='./usuario.html'">
        <img src="image/user.png" alt="">
        <span>Usuarios</span>
      </div>

      <div class="menu-item" onclick="window.location.href='./registros_emocionales_admin.html'">
        <img src="image/registroemocional.png" alt="">
        <span>Registros</span>
      </div>

      <div class="menu-item" onclick="window.location.href='./estadisticas.html'">
        <img src="image/grafica.png" alt="">
        <span>Estadísticas</span>
      </div>

      <div class="menu-item active">
        <img src="image/admin.png" alt="">
        <span>Admins</span>
      </div>

    </nav>

    <!-- USUARIO -->
    <section class="user-box">
      <img id="fotoPerfil" src="image/user.jpg" alt="Foto perfil">

      <div>
        <b id="nombreUser">Tu Nombre</b><br>
        <small id="correoUser">tu@email.com</small>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <button class="logout-btn" onclick="logout()">
        Cerrar sesión
      </button>
    </footer>

  </aside>

  <!-- CONTENIDO -->
  <main class="admin-content">

    <!-- HEADER -->
    <header class="admin-header">

      <h1>Lista de administradores</h1>

      <div class="admin-top-bar">

        <!-- SEARCH -->
        <search class="admin-search-box">
          <input
            type="text"
            id="buscadorAdmins"
            placeholder="Buscar usuario..."
            aria-label="Buscar administrador"
          >
        </search>

        <button
          class="admin-btn-add"
          onclick="window.location.href='anadir_admin.html'"
        >
          Añadir administrador
        </button>

      </div>

    </header>

    <!-- TABLA -->
    <section class="admin-card">

      <table class="admin-tabla">

        <thead>
          <tr>
            <th scope="col">Nombre</th>
            <th scope="col">Correo</th>
            <th scope="col">Registro</th>
            <th scope="col">Acciones</th>
          </tr>
        </thead>

        <!-- DATOS -->
        <tbody id="tablaAdmins"></tbody>

      </table>

      <!-- FOOTER -->
      <footer class="admin-footer">

        <span id="contadorAdmins">
          Mostrando 0 administradores
        </span>

        <nav class="admin-paginacion">

          <button aria-label="Anterior">‹</button>

          <span class="active">1</span>

          <button aria-label="Siguiente">›</button>

        </nav>

      </footer>

    </section>

  </main>

  <!-- SCRIPT -->
  <script src="app.js"></script>

  <script>

    // =========================
    // 🔍 BUSCADOR ADMINS
    // =========================
    document.getElementById("buscadorAdmins")
    .addEventListener("input", function () {

      const filtro = this.value.toLowerCase();

      const filas =
        document.querySelectorAll("#tablaAdmins tr");

      filas.forEach(fila => {

        const texto =
          fila.innerText.toLowerCase();

        fila.style.display =
          texto.includes(filtro)
          ? ""
          : "none";

      });

    });

    // =========================
    // 🗑️ QUITAR ADMIN
    // =========================
    async function eliminarAdmin(id) {

      const confirmar = confirm(
        "¿Deseas quitar permisos de administrador?"
      );

      if (!confirmar) return;

      try {

        const response = await fetch(
          `/admins/${id}/remove`,
          {
            method: "PUT"
          }
        );

        const text =
          await response.text();

        console.log(text);

        const data =
          JSON.parse(text);

        if (data.ok) {

          alert(
            "Administrador convertido en usuario"
          );

          location.reload();

        } else {

          alert(data.error);

        }

      } catch (error) {

        console.error(error);

        alert(error);

      }

    }

  </script>

</body>

</html>
